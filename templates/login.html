{% extends 'base.html' %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <div class="auth-header">
            <h1>🔑 Iniciar Sesión</h1>
            <p>Accede a tu cuenta</p>
        </div>

        <form method="POST">

            <!-- TIPO DE USUARIO -->
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button type="button" onclick="setTipo('paciente')" id="btnPaciente" class="btn-secondary" style="flex:1;">
                    👤 Paciente
                </button>
                <button type="button" onclick="setTipo('medico')" id="btnMedico" class="btn-secondary" style="flex:1;">
                    👨‍⚕️ Médico
                </button>
            </div>

            <input type="hidden" name="tipo" id="tipo" value="paciente">

            <!-- CAMPOS PACIENTE: CI + Complemento -->
            <div id="campos-paciente">
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 2;">
                        <label for="ci">Número de Carnet de Identidad</label>
                        <input type="text" id="ci" name="ci" placeholder="Ej: 12345678" maxlength="20">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="complemento">Complemento <span style="color: #94a3b8; font-size: 12px;">(opcional)</span></label>
                        <input type="text" id="complemento" name="complemento" placeholder="Ej: 1A" maxlength="5">
                    </div>
                </div>
            </div>

            <!-- CAMPOS MÉDICO: Email -->
            <div id="campos-medico" style="display: none;">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com">
                </div>
            </div>

            <!-- CONTRASEÑA (común para ambos) -->
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-auth">Ingresar</button>
        </form>

        <div class="auth-footer">
            ¿No tienes cuenta? <a href="{{ url_for('registro') }}">Regístrate aquí</a>
        </div>
    </div>
</section>

<script>
function setTipo(tipo) {
    document.getElementById('tipo').value = tipo;

    const btnPaciente = document.getElementById('btnPaciente');
    const btnMedico   = document.getElementById('btnMedico');
    const camposPaciente = document.getElementById('campos-paciente');
    const camposMedico   = document.getElementById('campos-medico');
    const ciInput        = document.getElementById('ci');
    const emailInput     = document.getElementById('email');

    if (tipo === 'medico') {
        btnMedico.classList.add('btn-primary');
        btnPaciente.classList.remove('btn-primary');
        camposMedico.style.display   = 'block';
        camposPaciente.style.display = 'none';
        emailInput.required = true;
        ciInput.required    = false;
    } else {
        btnPaciente.classList.add('btn-primary');
        btnMedico.classList.remove('btn-primary');
        camposPaciente.style.display = 'block';
        camposMedico.style.display   = 'none';
        ciInput.required    = true;
        emailInput.required = false;
    }
}

// Inicia en modo paciente por defecto
setTipo('paciente');
</script>

{% endblock %}
